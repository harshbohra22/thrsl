# =============================================================================
# thrsl-backend-poc — Docker Compose
# =============================================================================
# Usage:
#   docker-compose up --build          (pehli baar ya code change ke baad)
#   docker-compose up                  (images already built hain toh)
#   docker-compose down                (sab band karo)
#   docker-compose logs -f gateway-service   (ek service ke logs dekho)
# =============================================================================

services:

  # ──────────────────────────────────────────────────────────────────
  # 1. Config Service  (Port 8888)  — SABSE PEHLE start hoga
  # ──────────────────────────────────────────────────────────────────
  config-service:
    build: ./config-service
    container_name: config-service
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - thrsl-network

  # ──────────────────────────────────────────────────────────────────
  # 2. Discovery Service  (Port 8761)  — Config ke baad start hoga
  # ──────────────────────────────────────────────────────────────────
  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888/
    depends_on:
      config-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - thrsl-network

  # ──────────────────────────────────────────────────────────────────
  # 3. Auth Service  (Dynamic Port)  — Config + Discovery ke baad
  # ──────────────────────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888/
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - thrsl-network

  # ──────────────────────────────────────────────────────────────────
  # 4. Products Service  (Dynamic Port)  — Config + Discovery ke baad
  # ──────────────────────────────────────────────────────────────────
  products-service:
    build: ./products-service
    container_name: products-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888/
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - thrsl-network

  # ──────────────────────────────────────────────────────────────────
  # 5. Gateway Service  (Port 8080)  — Sabse last mein start hoga
  # ──────────────────────────────────────────────────────────────────
  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888/
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      auth-service:
        condition: service_started
      products-service:
        condition: service_started
    networks:
      - thrsl-network

# =============================================================================
# Network — sabhi services ek private network mein hongi
# =============================================================================
networks:
  thrsl-network:
    driver: bridge
