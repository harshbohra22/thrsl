# -----------------------------------------------------------
# Gateway Service — Docker config (served by Config Service)
# "localhost" → container names: "config-service", "discovery-service"
# -----------------------------------------------------------
server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/

spring:
  cloud:
    gateway:
      routes:
        - id: products-service
          uri: lb://products-service
          predicates:
            - Path=/products/**
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
