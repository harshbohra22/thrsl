# -----------------------------------------------------------
# Discovery Service — Docker profile
# eureka.instance.hostname = "discovery-service" (Docker container name)
# -----------------------------------------------------------
server:
  port: 8761

spring:
  application:
    name: discovery-service

eureka:
  instance:
    hostname: discovery-service
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
