<header class="header">
  <div class="header__inner">
    <a routerLink="/categories" class="header__logo">
      <span class="header__logo-icon">⚙️</span>
      <span class="header__logo-text">THRSL</span>
      <span class="header__logo-sub">Robot Catalog</span>
    </a>
    <nav class="header__nav">
      @if (isAuthenticated()) {
        <a routerLink="/categories" routerLinkActive="active" class="header__nav-link">
          <span class="nav-icon">📂</span> Catalog
        </a>
        <div class="header__user">
          <span class="user-name">Welcome, {{ currentUser()?.name }}</span>
          <button (click)="logout()" class="btn-logout">Logout</button>
        </div>
      } @else {
        <a routerLink="/login" routerLinkActive="active" class="header__nav-link">Login</a>
        <a routerLink="/register" routerLinkActive="active" class="header__nav-link header__nav-link--cta">Register</a>
      }
    </nav>
  </div>
</header>
