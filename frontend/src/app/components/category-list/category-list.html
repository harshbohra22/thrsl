<section class="page-section page-enter">
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">Robot Categories</h1>
      <p class="page-subtitle">Explore our comprehensive catalog of robotic systems organized by application domain.</p>
    </div>

    <div class="category-grid">
      @for (category of categories; track category.id; let i = $index) {
        <a
          [routerLink]="['/categories', category.id, 'robots']"
          class="category-card"
          [style.animation-delay]="(i * 80) + 'ms'"
        >
          <div class="category-card__glow"></div>
          <div class="category-card__icon">{{ category.icon }}</div>
          <div class="category-card__content">
            <h3 class="category-card__name">{{ category.name }}</h3>
            <p class="category-card__desc">{{ category.description }}</p>
          </div>
          <div class="category-card__footer">
            <span class="category-card__count">{{ category.robotCount }} Robots</span>
            <span class="category-card__arrow">→</span>
          </div>
        </a>
      }
    </div>
  </div>
</section>
